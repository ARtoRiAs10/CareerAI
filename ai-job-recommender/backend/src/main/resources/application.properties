# ==============================================================
# SERVER CONFIGURATION
# ==============================================================
# Render sets the PORT environment variable automatically
server.port=${PORT:8080}

# ==============================================================
# DATABASE CONFIGURATION (Neon PostgreSQL / Local H2)
# ==============================================================
# For Neon on Render, set DATABASE_URL to: jdbc:postgresql://your-neon-host.tech/neondb?sslmode=require
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:careerai;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DATABASE_USER:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# Automatically switch dialect based on the active DB
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}

# ==============================================================
# SECURITY & JWT
# ==============================================================
# Generate a long random string for JWT_SECRET in Render Env Vars
jwt.secret=${JWT_SECRET:your_super_secret_local_key_for_development_only_12345}
# 24 hours in milliseconds
jwt.expiration=86400000

# ==============================================================
# OPENROUTER AI CONFIGURATION
# ==============================================================
openrouter.api.key=${OPENROUTER_API_KEY}
openrouter.api.url=https://openrouter.ai/api/v1/chat/completions
openrouter.model=${OPENROUTER_MODEL:stepfun/step-3.5-flash:free}

# Required for OpenRouter headers
openrouter.site.url=${FRONTEND_URL:http://localhost:3000}
openrouter.site.name=CareerAI

# ==============================================================
# ADDITIONAL SETTINGS
# ==============================================================
# Handle proxy headers from Render/GitHub Codespaces
server.forward-headers-strategy=framework

# Allow H2 Console for local debugging (accessible at /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# File upload limits (useful for resumes)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB